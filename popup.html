<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sisyphus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="appTitle" title="Double-click to edit">Sisyphus</h1>
      <div class="header-actions">
        <button id="repeatViewBtn" class="eye-btn" title="Show repeating todos" aria-label="Show repeating todos" aria-pressed="false">
          <svg class="eye-open-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-closed-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
            <path d="M9.8 5.2A9.8 9.8 0 0 1 12 5c6.5 0 10 7 10 7a13.3 13.3 0 0 1-2.2 3.1"></path>
            <path d="M6.1 6.8C3.5 8.5 2 12 2 12s3.5 7 10 7a9.8 9.8 0 0 0 4.1-.9"></path>
          </svg>
        </button>
        <button id="reminderBtn" class="bell-btn" title="每日提醒" data-i18n-title="bell.title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </button>
        <button id="addBtn" class="add-btn" title="Add new todo">
          <svg class="icon-plus" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="reminderPanel" class="reminder-panel hidden">
      <div class="reminder-row">
        <span class="reminder-label" data-i18n="reminder.dailyLabel">每日提醒</span>
        <label class="switch">
          <input type="checkbox" id="reminderToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="reminder-row">
        <span class="reminder-label" data-i18n="reminder.timeLabel">提醒时间</span>
        <div class="time-select">
          <input type="text" id="reminderTimeInput" class="time-field reminder-time-input" aria-label="提醒时间，24 小时制" data-i18n-aria="reminder.timeAria" placeholder="20:00" maxlength="5" inputmode="numeric" autocomplete="off">
        </div>
      </div>
      <div class="reminder-row">
        <span class="reminder-label">Snooze</span>
        <select id="snoozeMinutes" class="time-field" aria-label="Snooze minutes">
          <option value="5">5m</option>
          <option value="10">10m</option>
          <option value="15">15m</option>
          <option value="30">30m</option>
        </select>
      </div>
      <p class="reminder-hint" data-i18n="reminder.hint">没完成的待办会在这个时间弹窗提醒你打卡</p>
    </div>

    <div id="addTodoForm" class="add-form hidden">
      <input type="text" id="todoInput" placeholder="要做点什么？  明天0930 / 每天2100" data-i18n-placeholder="input.placeholder" class="todo-input" autofocus>

      <div id="extraFields" class="extra-fields">
        <div class="form-row">
          <div class="form-group">
            <label>Deadline <span class="optional-label">optional</span></label>
            <div class="date-input-wrapper">
              <input type="text" id="dueDateDisplay" class="form-input" placeholder="mm/dd" readonly>
              <input type="date" id="dueDateInput" class="form-input">
              <button type="button" id="clearDueDateBtn" class="date-clear-btn" title="Clear deadline" aria-label="Clear deadline">&times;</button>
              <svg class="calendar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Repeat</label>
            <div class="custom-select">
              <div class="select-display">None</div>
              <select id="repeatSelect">
                <option value="none">None</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
              <div class="select-dropdown">
                <div class="select-option" data-value="none">None</div>
                <div class="select-option" data-value="daily">Daily</div>
                <div class="select-option" data-value="weekly">Weekly</div>
                <div class="select-option" data-value="monthly">Monthly</div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label data-i18n="reminder.timeLabel">提醒时间</label>
            <input type="text" id="todoReminderInput" class="form-input reminder-input" placeholder="默认 (如 09:30)" data-i18n-placeholder="reminder.defaultHint" maxlength="5" list="reminderHistory">
          </div>
          <div class="form-group">
            <label>Re-remind</label>
            <div class="custom-select">
              <div class="select-display">Off</div>
              <select id="todoNagMinutes">
                <option value="0">Off</option>
                <option value="5">5m</option>
                <option value="10">10m</option>
                <option value="15">15m</option>
                <option value="30">30m</option>
              </select>
              <div class="select-dropdown">
                <div class="select-option" data-value="0">Off</div>
                <div class="select-option" data-value="5">5m</div>
                <div class="select-option" data-value="10">10m</div>
                <div class="select-option" data-value="15">15m</div>
                <div class="select-option" data-value="30">30m</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button id="cancelBtn" class="btn-cancel">Cancel</button>
      </div>
    </div>

    <div id="editTodoForm" class="edit-form hidden">
      <input type="text" id="editTodoInput" class="todo-input">

      <div class="extra-fields">
        <div class="form-row">
          <div class="form-group">
            <label>Deadline <span class="optional-label">optional</span></label>
            <div class="date-input-wrapper">
              <input type="text" id="editDueDateDisplay" class="form-input" placeholder="mm/dd" readonly>
              <input type="date" id="editDueDateInput" class="form-input">
              <button type="button" id="clearEditDueDateBtn" class="date-clear-btn" title="Clear deadline" aria-label="Clear deadline">&times;</button>
              <svg class="calendar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Repeat</label>
            <div class="custom-select">
              <div class="select-display">None</div>
              <select id="editRepeatSelect">
                <option value="none">None</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
              <div class="select-dropdown">
                <div class="select-option" data-value="none">None</div>
                <div class="select-option" data-value="daily">Daily</div>
                <div class="select-option" data-value="weekly">Weekly</div>
                <div class="select-option" data-value="monthly">Monthly</div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label data-i18n="reminder.timeLabel">提醒时间</label>
            <input type="text" id="editTodoReminderInput" class="form-input reminder-input" placeholder="默认 (如 09:30)" data-i18n-placeholder="reminder.defaultHint" maxlength="5" list="reminderHistory">
          </div>
          <div class="form-group">
            <label>Re-remind</label>
            <div class="custom-select">
              <div class="select-display">Off</div>
              <select id="editTodoNagMinutes">
                <option value="0">Off</option>
                <option value="5">5m</option>
                <option value="10">10m</option>
                <option value="15">15m</option>
                <option value="30">30m</option>
              </select>
              <div class="select-dropdown">
                <div class="select-option" data-value="0">Off</div>
                <div class="select-option" data-value="5">5m</div>
                <div class="select-option" data-value="10">10m</div>
                <div class="select-option" data-value="15">15m</div>
                <div class="select-option" data-value="30">30m</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button id="cancelEditBtn" class="btn-cancel">Cancel</button>
      </div>
    </div>

    <div id="todoList" class="todo-list"></div>

    <div id="emptyState" class="empty-state hidden">
      <p>And miles to go before I sleep...</p>
    </div>

    <footer class="quote-footer" id="quoteFooter" title="Double-click to edit">
      <p class="quote-text" id="quoteText">One must imagine Sisyphus happy.</p>
      <p class="quote-author" id="quoteAuthor">Albert Camus</p>
    </footer>
  </div>

  <datalist id="reminderHistory"></datalist>
  <script src="i18n.js"></script>
  <script src="todo-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
